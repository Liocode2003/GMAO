version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: sgrh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sgrh_cabinet}
      POSTGRES_USER: ${DB_USER:-sgrh_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-sgrh_secure_pass_2024}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
      - ./database/seeds/demo_data.sql:/docker-entrypoint-initdb.d/02_seeds.sql:ro
      - ./database/migration_v2.sql:/docker-entrypoint-initdb.d/03_migration_v2.sql:ro
      - ./database/04_migration_diplomas.sql:/docker-entrypoint-initdb.d/04_migration_diplomas.sql:ro
      - ./database/migration_commercial.sql:/docker-entrypoint-initdb.d/05_migration_commercial.sql:ro
      - ./database/migration_leaves_v2.sql:/docker-entrypoint-initdb.d/06_migration_leaves_v2.sql:ro
      - ./database/update_user.sql:/docker-entrypoint-initdb.d/07_update_user.sql:ro
      - ./database/migrations/009_evaluations.sql:/docker-entrypoint-initdb.d/09_evaluations.sql:ro
      - ./database/migrations/010_recruitment.sql:/docker-entrypoint-initdb.d/10_recruitment.sql:ro
      - ./database/migrations/011_employee_documents.sql:/docker-entrypoint-initdb.d/11_employee_documents.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sgrh_user} -d ${DB_NAME:-sgrh_cabinet}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sgrh_network

  backend-test:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    container_name: sgrh_backend_test
    profiles: [test]
    working_dir: /app
    command: npm test
    environment:
      NODE_ENV: test
      JWT_SECRET: test_secret_key_for_jest
    networks:
      - sgrh_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgrh_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-sgrh_cabinet}
      DB_USER: ${DB_USER:-sgrh_user}
      DB_PASSWORD: ${DB_PASSWORD:-sgrh_secure_pass_2024}
      JWT_SECRET: ${JWT_SECRET:-change_this_secret_in_production_min_32_chars}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - backend_logs:/app/logs
      - backend_reports:/app/reports
      - backend_uploads:/app/uploads
    networks:
      - sgrh_network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sgrh_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - sgrh_network

  nginx:
    image: nginx:alpine
    container_name: sgrh_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - sgrh_network

volumes:
  postgres_data:
  backend_logs:
  backend_reports:
  backend_uploads:
  nginx_logs:

networks:
  sgrh_network:
    driver: bridge
