name: Flutter CI

on:
  push:
    branches:
      - main
      - 'claude/**'
  pull_request:
    branches:
      - main
      - 'claude/**'

jobs:
  # ── Analyse statique ─────────────────────────────────────────────────────────
  analyze:
    name: Analyse statique (flutter analyze)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Flutter 3.19.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Cache des packages pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/sapeur_pompier_manager/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('sapeur_pompier_manager/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Installation des dépendances
        working-directory: sapeur_pompier_manager
        run: flutter pub get

      - name: Analyse du code
        working-directory: sapeur_pompier_manager
        run: flutter analyze --fatal-infos

  # ── Tests unitaires ──────────────────────────────────────────────────────────
  test:
    name: Tests unitaires (flutter test)
    runs-on: ubuntu-latest
    needs: analyze

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation de Flutter 3.19.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Cache des packages pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/sapeur_pompier_manager/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('sapeur_pompier_manager/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Installation des dépendances
        working-directory: sapeur_pompier_manager
        run: flutter pub get

      - name: Exécution des tests
        working-directory: sapeur_pompier_manager
        run: flutter test --coverage --reporter expanded

      - name: Upload du rapport de couverture
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: sapeur_pompier_manager/coverage/
          retention-days: 14

  # ── Build Linux Release ──────────────────────────────────────────────────────
  build_linux:
    name: Build Linux Release
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Installation des dépendances système Linux
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev \
            libsqlite3-dev

      - name: Installation de Flutter 3.19.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Cache des packages pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/sapeur_pompier_manager/.dart_tool
          key: ${{ runner.os }}-pub-${{ hashFiles('sapeur_pompier_manager/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Activation du support Linux
        run: flutter config --enable-linux-desktop

      - name: Installation des dépendances Flutter
        working-directory: sapeur_pompier_manager
        run: flutter pub get

      - name: Compilation Linux Release
        working-directory: sapeur_pompier_manager
        run: flutter build linux --release

      - name: Upload des artefacts de build
        uses: actions/upload-artifact@v4
        with:
          name: linux-release-build
          path: sapeur_pompier_manager/build/linux/x64/release/bundle/
          retention-days: 30
          if-no-files-found: error
